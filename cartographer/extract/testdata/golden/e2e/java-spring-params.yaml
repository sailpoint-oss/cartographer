components:
    schemas:
        ErrorResponse:
            properties:
                detailCode:
                    type: string
                messages:
                    items:
                        properties:
                            locale:
                                type: string
                            localeOrigin:
                                type: string
                            text:
                                type: string
                        type: object
                    type: array
                trackingId:
                    type: string
            type: object
        SpringDTO:
            properties:
                active:
                    type: boolean
                id:
                    type: string
                name:
                    type: string
            type: object
info:
    title: Spring Params
    version: "1.0"
openapi: 3.0.3
paths:
    /api/v1/spring:
        get:
            description: Retrieve a list of Spring.
            operationId: list
            parameters:
                - explode: true
                  in: query
                  name: active
                  required: false
                  schema:
                    default: true
                    type: boolean
                  style: form
                - description: Max number of results to return.
                  example: "250"
                  explode: true
                  in: query
                  name: limit
                  required: false
                  schema:
                    default: 50
                    format: int32
                    type: integer
                  style: form
                - explode: true
                  in: query
                  name: name
                  required: false
                  schema:
                    type: string
                  style: form
                - description: Offset into the full result set. Usually specified with `limit` to paginate through the results.
                  example: "0"
                  explode: true
                  in: query
                  name: offset
                  required: false
                  schema:
                    default: 0
                    format: int32
                    type: integer
                  style: form
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: '#/components/schemas/SpringDTO'
                                type: array
                    description: List of Spring
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Bad Request - Invalid input parameters
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Unauthorized - Authentication required
                "403":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Forbidden - Insufficient permissions
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Internal Server Error
            summary: List Spring
            tags:
                - Spring
tags:
    - description: Operations related to Spring
      name: Spring
