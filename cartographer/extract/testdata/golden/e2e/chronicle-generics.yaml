components:
    schemas:
        ConfigItem:
            properties:
                key:
                    type: string
                value:
                    type: string
            type: object
        ErrorResponse:
            properties:
                detailCode:
                    type: string
                messages:
                    items:
                        properties:
                            locale:
                                type: string
                            localeOrigin:
                                type: string
                            text:
                                type: string
                        type: object
                    type: array
                trackingId:
                    type: string
            type: object
        ServiceAPI:
            properties:
                active:
                    type: boolean
                id:
                    type: string
                name:
                    type: string
                version:
                    type: string
            type: object
info:
    title: Chronicle
    version: "1.0"
openapi: 3.0.3
paths:
    /api/v1/chronicle/configs:
        get:
            description: Retrieve a list of Configs.
            operationId: getConfigs
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                additionalProperties:
                                    items:
                                        $ref: '#/components/schemas/ConfigItem'
                                    type: array
                                type: object
                    description: List of Configs
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Bad Request - Invalid input parameters
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Unauthorized - Authentication required
                "403":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Forbidden - Insufficient permissions
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Internal Server Error
            summary: List Configs
            tags:
                - Chronicle
    /api/v1/chronicle/services:
        get:
            description: Retrieve a list of Services.
            operationId: listServices
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: '#/components/schemas/ServiceAPI'
                                type: array
                    description: List of Services
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Bad Request - Invalid input parameters
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Unauthorized - Authentication required
                "403":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Forbidden - Insufficient permissions
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Internal Server Error
            summary: List Services
            tags:
                - Chronicle
        post:
            description: Create a new Service.
            operationId: createService
            requestBody:
                content:
                    application/json:
                        schema:
                            properties:
                                active:
                                    type: boolean
                                id:
                                    type: string
                                name:
                                    type: string
                                version:
                                    type: string
                            type: object
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                properties:
                                    active:
                                        type: boolean
                                    id:
                                        type: string
                                    name:
                                        type: string
                                    version:
                                        type: string
                                type: object
                    description: Service created
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Bad Request - Invalid input parameters
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Unauthorized - Authentication required
                "403":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Forbidden - Insufficient permissions
                "409":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Conflict - Resource already exists or state conflict
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Internal Server Error
            summary: Create Service
            tags:
                - Chronicle
    /api/v1/chronicle/services/{id}:
        get:
            description: Retrieve a single Service by its unique identifier.
            operationId: getService
            parameters:
                - description: The unique identifier of the resource.
                  example: 2c91808a7813090a017814121919ecca
                  in: path
                  name: id
                  required: true
                  schema:
                    type: string
                  style: simple
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                properties:
                                    active:
                                        type: boolean
                                    id:
                                        type: string
                                    name:
                                        type: string
                                    version:
                                        type: string
                                type: object
                    description: Service
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Bad Request - Invalid input parameters
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Unauthorized - Authentication required
                "403":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Forbidden - Insufficient permissions
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Not Found - Resource does not exist
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                    description: Internal Server Error
            summary: Get Service
            tags:
                - Chronicle
tags:
    - description: Operations related to Chronicle
      name: Chronicle
